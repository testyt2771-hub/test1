name: prtarget-test
on:
  pull_request_target:
    branches: [ main ]
permissions:
  contents: write
  pull-requests: write
jobs:
  privtest:
    runs-on: ubuntu-latest
    steps:
      - name: checkout PR HEAD (the classic footgun)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: run PR-controlled script in privileged context
        env:
          CANARY: ${{ secrets.PRTARGET_CANARY }}
        run: |
          echo "event=${{ github.event_name }} base=${{ github.repository }} actor=${{ github.actor }}"
          echo "token-perm-probe:"
          curl -s -H "Authorization: token $GITHUB_TOKEN" https://api.github.com/repos/${{ github.repository }} -o /dev/null -w "repo-read=%{http_code}\n"
          # write test: can the token push? (creates a harmless ref)
          curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" https://api.github.com/repos/${{ github.repository }}/git/refs -d '{"ref":"refs/heads/prtarget-tokwrite-probe","sha":"'"$GITHUB_SHA"'"}' -o /dev/null -w "ref-create=%{http_code}\n"
          echo "secret-len=${#CANARY}"
          if [ -f ./prscript.sh ]; then echo "RUNNING PR-CONTROLLED SCRIPT"; bash ./prscript.sh; else echo "no prscript.sh in tree"; fi
