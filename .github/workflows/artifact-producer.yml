name: artifact-producer
on: workflow_dispatch
permissions:
  contents: read
jobs:
  produce:
    runs-on: ubuntu-latest
    steps:
      - run: |
          mkdir -p out
          echo "SENSITIVE_ARTIFACT_CANARY_a7c2 build-secret-context" > out/secret.txt
      - uses: actions/upload-artifact@v4
        with:
          name: privileged-artifact
          path: out
